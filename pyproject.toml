[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, bugbear, comprehensions, pyupgrade.
select = ["E", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]  # line length is handled by the formatter

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E", "F"]
